<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/all.min.css">
</head>

<body>

<!-- NAV BAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>

      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-outline-success">Search</button>
      </form>
    </div>
  </div>
</nav>
<!-- END NAV -->

<!-- CONTACT FORM -->
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">

      <form id="contactForm" class="contact-form">
        <h2 class="text-center mb-4">Contact Us</h2>

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>

        <!-- Phone -->
        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="text" id="phone" class="form-control" required>
        </div>

        <!-- Address -->
        <div class="mb-3">
          <label for="address" class="form-label">Address</label>
          <input type="text" id="address" class="form-control" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">Submit</button>
        </div>
      </form>

    </div>
  </div>
</div>

<br><br><br>

<!-- Footer -->

    <!-- FOOTER BOTTOM (LEFT - TIME - RIGHT) -->
    <div class="footer-bottom mt-5">
        <div class="container">
            <div class="row align-items-center py-3 text-center">

                <!-- LEFT -->
                <div class="col-md-4">
                    <p class="mb-0">© 2026 YourBrand</p>
                </div>

                <!-- MIDDLE (LIVE CLOCK) -->
                <div class="col-md-4">
                    <p class="mb-0">
                        <span id="time"></span> | <span id="date"></span>
                    </p>
                </div>

                <!-- RIGHT -->
                <div class="col-md-4">
                    <p class="mb-0">Made with ❤️ by YourBrand</p>
                </div>

            </div>
        </div>
    </div>

</footer>


<!-- SCRIPTS -->
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    let confirmSubmit = confirm("Are you sure you want to send this message?");

    if(confirmSubmit){
        alert("Message sent successfully!");
        this.reset();
    } else {
        alert("Cancelled!");
    }
});
</script>

</body>
</html>
